    <path d="M960 0V1080" stroke="#CBA6F7" stroke-opacity="0.14"/>
    <path d="M0 0L1920 1080" stroke="#89B4FA" stroke-opacity="0.08"/>
    <path d="M1920 0L0 1080" stroke="#A6E3A1" stroke-opacity="0.08"/>
  </g>
  <g opacity="0.2">
    <circle cx="1740" cy="180" r="4" fill="#F5E0DC"/>
