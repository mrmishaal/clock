<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11111B"/>
      <stop offset="0.5" stop-color="#181825"/>
      <stop offset="1" stop-color="#1E1E2E"/>
    </linearGradient>
    <radialGradient id="green" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 260) rotate(90) scale(420 500)">
      <stop stop-color="#A6E3A1" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#A6E3A1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(520 820) rotate(90) scale(340 420)">
      <stop stop-color="#89B4FA" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#89B4FA" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
