    <filter id="blur" x="-100" y="-100" width="2120" height="1280" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="52"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
